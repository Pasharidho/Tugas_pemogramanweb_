<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal Portfolio Pasha Ridho - Pixel Hub Style">
    <title>Pasha Ridho | Pixel Hub</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <!-- Konfigurasi Tailwind Custom -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'retro-bg': '#0f172a',
                        'retro-card': '#1e293b',
                        'retro-green': '#4ade80',
                        'retro-dark-green': '#14532d',
                    },
                    fontFamily: {
                        'pixel': ['"Press Start 2P"', 'cursive'],
                        'terminal': ['"VT323"', 'monospace'],
                    },
                    boxShadow: {
                        'pixel': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'pixel-hover': '2px 2px 0px 0px rgba(0,0,0,1)',
                        'pixel-active': '0px 0px 0px 0px rgba(0,0,0,1)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'VT323', monospace;
            background-color: #0f172a;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(74, 222, 128, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 222, 128, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 50;
        }

        img {
            image-rendering: pixelated;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .animate-floating {
            animation: floating 4s ease-in-out infinite;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a2e; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4ade80; 
            border: 2px solid #1a1a2e;
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-center items-center p-4 selection:bg-retro-green selection:text-retro-bg">

    <div class="crt-overlay"></div>

    <main class="relative z-10 w-full max-w-lg">
        
        <div class="animate-floating bg-retro-card/90 border-4 border-retro-green shadow-pixel p-6 md:p-10 text-center relative backdrop-blur-sm">
            
            <div class="absolute top-0 left-0 w-4 h-4 bg-retro-green border-r-2 border-b-2 border-retro-card translate-x-[-2px] translate-y-[-2px]"></div>
            <div class="absolute bottom-0 right-0 w-4 h-4 bg-retro-green border-l-2 border-t-2 border-retro-card translate-x-[2px] translate-y[2px]"></div>

            <div class="relative w-32 h-32 mx-auto mb-6 group">
                <div class="absolute inset-0 bg-retro-green opacity-20 blur-md rounded-full group-hover:opacity-40 transition-opacity duration-300"></div>
                
                <img src="https://cdn.discordapp.com/attachments/1405172324461711462/1491272757189673061/pasha_ridho_pradipta_setiawan.jpg?ex=69d9ba7b&is=69d868fb&hm=c56fbd7d5c75bc1945c78215dff60fa17062b0fbc93e0f0b7756c9a882865d77&" 
                     alt="Pasha Ridho" 
                     class="relative w-full h-full object-cover border-4 border-white bg-gray-700 shadow-lg">
                
                <div class="absolute -bottom-2 -right-2 bg-retro-green text-retro-bg px-2 py-0.5 border-2 border-white text-[10px] font-bold font-pixel shadow-sm">
                    LVL 99
                </div>
            </div>

            <p class="text-retro-green tracking-[0.2em] text-sm md:text-base mb-2 animate-pulse">
                > INSERT COIN
            </p>
            
            <h1 class="font-pixel text-sm md:text-lg mb-2 leading-tight text-white uppercase">
                Pasha Ridho<br>
                <span class="text-retro-green text-xs md:text-sm mt-2 block normal-case tracking-widest font-terminal text-xl md:text-2xl">
                    Pradipta Setiawan
                </span>
            </h1>

            <div class="bg-black/30 p-3 mb-8 border-l-2 border-retro-green text-left mx-2 md:mx-6">
                <p class="text-gray-300 text-xl md:text-2xl leading-tight font-terminal">
                    <span class="text-retro-green mr-2">$</span> Mahasiswa Pendidikan Komputer.<br>
                    <span class="text-retro-green mr-2">$</span> Memulai petualangan digital...
                </p>
            </div>

            <!-- NAVIGATION GRID - TINGGAL 3 TOMBOL -->
            <div class="grid grid-cols-3 gap-3 md:gap-4">
                
                <!-- BLOG -->
                <a href="blog.html" class="group relative flex flex-col items-center justify-center p-3 bg-blue-900/40 border-2 border-blue-400 hover:bg-blue-900/60 transition-all duration-100 active:translate-y-1 active:shadow-none">
                    <div class="absolute inset-0 bg-blue-400/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <i class="fa-solid fa-layer-group text-2xl mb-2 text-blue-300 group-hover:text-white group-hover:-translate-y-1 transition-transform"></i>
                    <span class="text-xs font-bold font-pixel text-blue-300 group-hover:text-white">BLOG</span>
                </a>

                <!-- KONTAK -->
                <a href="Kontak.html" class="group relative flex flex-col items-center justify-center p-3 bg-green-900/40 border-2 border-green-400 hover:bg-green-900/60 transition-all duration-100 active:translate-y-1 active:shadow-none">
                    <div class="absolute inset-0 bg-green-400/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <i class="fa-solid fa-paper-plane text-2xl mb-2 text-green-300 group-hover:text-white group-hover:-translate-y-1 transition-transform"></i>
                    <span class="text-xs font-bold font-pixel text-green-300 group-hover:text-white">KONTAK</span>
                </a>

                <!-- CV -->
                <a href="Cv.html" class="group relative flex flex-col items-center justify-center p-3 bg-purple-900/40 border-2 border-purple-400 hover:bg-purple-900/60 transition-all duration-100 active:translate-y-1 active:shadow-none">
                    <div class="absolute inset-0 bg-purple-400/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <i class="fa-solid fa-file-invoice text-2xl mb-2 text-purple-300 group-hover:text-white group-hover:-translate-y-1 transition-transform"></i>
                    <span class="text-xs font-bold font-pixel text-purple-300 group-hover:text-white">CV</span>
                </a>

            </div>

            <div class="mt-8 flex items-center justify-center opacity-60 space-x-4">
                <i class="fa-solid fa-ghost text-xl hover:text-retro-green transition-colors cursor-pointer hover:animate-bounce"></i>
                <span class="text-lg font-terminal">PRESS START</span>
                <i class="fa-solid fa-gamepad text-xl hover:text-retro-green transition-colors cursor-pointer hover:animate-bounce"></i>
            </div>
        </div>
    </main>

    <!-- Gameboy Controls -->
    <div class="fixed bottom-6 left-6 z-40 hidden md:flex flex-col items-center gap-2">
        <div class="text-[10px] font-pixel text-gray-500 mb-1">CONTROLS</div>
        <div class="flex gap-2">
            <div class="w-12 h-12 bg-gray-800 border-4 border-gray-600 rounded-full flex items-center justify-center shadow-lg active:scale-95 active:border-red-500 transition-transform cursor-pointer group">
                <div class="w-10 h-10 bg-gray-900 rounded-full flex items-center justify-center">
                    <div class="w-6 h-6 bg-red-600 rounded-full shadow-[inset_2px_2px_5px_rgba(0,0,0,0.5),inset_-2px_-2px_5px_rgba(255,255,255,0.2)] group-active:bg-red-500 transition-colors"></div>
                </div>
            </div>
            <div class="w-12 h-12 bg-gray-800 border-4 border-gray-600 rounded-full flex items-center justify-center shadow-lg active:scale-95 active:border-red-500 transition-transform cursor-pointer group">
                <div class="w-10 h-10 bg-gray-900 rounded-full flex items-center justify-center">
                    <div class="w-6 h-6 bg-red-600 rounded-full shadow-[inset_2px_2px_5px_rgba(0,0,0,0.5),inset_-2px_-2px_5px_rgba(255,255,255,0.2)] group-active:bg-red-500 transition-colors"></div>
                </div>
            </div>
        </div>
        <div class="flex gap-3 mt-[-10px] z-50 pointer-events-none">
            <span class="text-gray-500 font-bold text-sm">B</span>
            <span class="text-gray-500 font-bold text-sm">A</span>
        </div>
    </div>

    <!-- Start/Pause Decor -->
    <div class="fixed bottom-6 right-6 z-40 hidden md:flex gap-4 items-center">
        <div class="w-12 h-4 border-2 border-gray-500 rounded-full rotate-[-45deg] opacity-50"></div>
        <div class="flex flex-col gap-2">
            <div class="w-12 h-4 bg-gray-800 border border-gray-600 transform rotate-[-20deg] origin-right cursor-pointer hover:bg-gray-700"></div>
            <div class="w-12 h-4 bg-gray-800 border border-gray-600 transform rotate-[-20deg] origin-right cursor-pointer hover:bg-gray-700"></div>
        </div>
    </div>

</body>
</html>
