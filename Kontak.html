<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Halaman kontak Muhammad Raihan Raffi - Hubungi via WhatsApp, GitHub, Instagram, LinkedIn, TikTok, atau Email.">
    <meta name="theme-color" content="#0a0f1e">
    <title>Kontak | Pasha Ridho Pradipta Setiawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        wa: '#25D366',
                        ig: '#E4405F',
                        li: '#0A66C2',
                        ml: '#EA4335',
                    },
                    borderRadius: {
                        'card': '1.25rem',
                        'icon': '0.875rem',
                        'shell': '2rem',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        drift1: {
                            '0%, 100%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '33%': { transform: 'translate(40px, -30px) rotate(5deg)' },
                            '66%': { transform: 'translate(-20px, 20px) rotate(-3deg)' },
                        },
                        drift2: {
                            '0%, 100%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '33%': { transform: 'translate(-30px, 40px) rotate(-4deg)' },
                            '66%': { transform: 'translate(25px, -15px) rotate(3deg)' },
                        },
                        drift3: {
                            '0%, 100%': { transform: 'translate(0, 0) scale(1)' },
                            '50%': { transform: 'translate(20px, 25px) scale(1.15)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '0.4' },
                            '50%': { opacity: '0.8' },
                        },
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards',
                        'fade-up-d1': 'fadeUp 0.5s 0.06s cubic-bezier(0.22,1,0.36,1) forwards',
                        'fade-up-d2': 'fadeUp 0.5s 0.12s cubic-bezier(0.22,1,0.36,1) forwards',
                        'fade-up-d3': 'fadeUp 0.5s 0.18s cubic-bezier(0.22,1,0.36,1) forwards',
                        'fade-up-d4': 'fadeUp 0.5s 0.24s cubic-bezier(0.22,1,0.36,1) forwards',
                        'fade-up-d5': 'fadeUp 0.5s 0.30s cubic-bezier(0.22,1,0.36,1) forwards',
                        'fade-up-d6': 'fadeUp 0.5s 0.36s cubic-bezier(0.22,1,0.36,1) forwards',
                        'fade-up-d7': 'fadeUp 0.5s 0.42s cubic-bezier(0.22,1,0.36,1) forwards',
                        'drift1': 'drift1 14s ease-in-out infinite',
                        'drift2': 'drift2 18s ease-in-out infinite',
                        'drift3': 'drift3 11s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 3s ease-in-out infinite',
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; }

        /* Layered gradient background */
        .bg-scene {
            background:
                radial-gradient(ellipse 80% 60% at 10% 20%, rgba(30, 58, 138, 0.35) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 90% 80%, rgba(6, 78, 59, 0.3) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(88, 28, 135, 0.12) 0%, transparent 60%),
                linear-gradient(165deg, #070b14 0%, #0c1525 30%, #0a1628 55%, #091a1a 80%, #060d12 100%);
        }

        /* Subtle grid */
        .bg-grid {
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .contact-item { opacity: 0; }
        .contact-item:active { transform: scale(0.96) !important; }
        .contact-item:focus-visible {
            outline: 2px solid rgba(16, 185, 129, 0.5);
            outline-offset: 2px;
        }

        /* Card glow variants */
        .glow-wa:hover { box-shadow: 0 8px 30px -8px rgba(37, 211, 102, 0.2); }
        .glow-gh:hover { box-shadow: 0 8px 30px -8px rgba(255, 255, 255, 0.08); }
        .glow-ig:hover { box-shadow: 0 8px 30px -8px rgba(228, 64, 95, 0.2); }
        .glow-li:hover { box-shadow: 0 8px 30px -8px rgba(10, 102, 194, 0.2); }
        .glow-tt:hover { box-shadow: 0 8px 30px -8px rgba(255, 255, 255, 0.06); }
        .glow-ml:hover { box-shadow: 0 8px 30px -8px rgba(234, 67, 53, 0.2); }

        /* Stagger offset for 2-col grid */
        .stagger-right { transform: translateY(1.5rem); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
    </style>
</head>
<body class="bg-scene text-white min-h-screen flex justify-center items-center px-4 py-8 md:py-12 relative overflow-x-hidden">

    <!-- Background layers -->
    <div class="fixed inset-0 pointer-events-none z-0" aria-hidden="true">

        <div class="absolute -bottom-28 -right-20 w-72 h-72 md:w-[24rem] md:h-[24rem] bg-emerald-600 rounded-full blur-[130px] opacity-[0.14] animate-drift2"></div>
        <div class="absolute top-1/3 right-1/4 w-56 h-56 md:w-72 md:h-72 bg-violet-600 rounded-full blur-[140px] opacity-[0.08] animate-drift3"></div>
        <div class="absolute bottom-1/4 left-1/3 w-40 h-40 bg-cyan-500 rounded-full blur-[100px] opacity-[0.06] animate-drift1" style="animation-delay: -4s;"></div>
    </div>

    <!-- Noise -->

         style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.85%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E');"></div>

            <i class="fa-solid fa-arrow-left text-[10px] group-hover:-translate-x-1 transition-transform duration-300"></i>
            <span>Kembali</span>

        </div>

        <!-- Divider -->
        <div class="contact-item animate-fade-up-d2 w-10 h-px bg-gradient-to-r from-transparent via-slate-700/60 to-transparent mx-auto mb-6"></div>

        <!-- Contact Grid -->
        <nav aria-label="Daftar kontak" class="grid grid-cols-2 gap-2.5 md:gap-3">

            <!-- WhatsApp — Primary, spans 2 cols -->
            <a href="https://wa.me/6285349714123" target="_blank" rel="noopener noreferrer"
               class="contact-item animate-fade-up-d3 col-span-2 flex items-center gap-3.5 p-3.5 md:p-4 bg-wa/[0.06] border border-wa/[0.12] rounded-card hover:bg-wa/[0.12] hover:border-wa/30 transition-all duration-300 group hover:-translate-y-0.5 glow-wa"
               aria-label="Hubungi via WhatsApp">

            <!-- GitHub -->

               aria-label="Kunjungi profil GitHub">

                    <i class="fa-brands fa-github text-xl md:text-2xl text-white"></i>

            <!-- Instagram -->
            <a href="https://www.instagram.com/pasha_leon_x/" target="_blank" rel="noopener noreferrer"

               aria-label="Kunjungi profil TikTok">

                    <i class="fa-brands fa-tiktok text-xl md:text-2xl text-white"></i>
                </div>
                <span class="block font-semibold text-xs md:text-sm text-white">TikTok</span>
                <span class="block text-[9px] text-slate-600 mt-0.5">Konten seru</span>

            <!-- Email — spans 2 cols -->
            <a href="https://mail.google.com/mail/u/0/#inbox"
               class="contact-item animate-fade-up-d7 col-span-2 flex items-center gap-3.5 p-3.5 md:p-4 bg-ml/[0.04] border border-ml/[0.08] rounded-card hover:bg-ml/[0.1] hover:border-ml/25 transition-all duration-300 group hover:-translate-y-0.5 glow-ml"
               aria-label="Kirim email">
                <div class="w-11 h-11 md:w-12 md:h-12 bg-ml/[0.12] rounded-icon flex items-center justify-center group-hover:scale-110 group-hover:bg-ml/20 transition-all duration-300 shrink-0">
                    <i class="fa-solid fa-envelope text-lg md:text-xl text-ml"></i>
                </div>
                <div class="text-left flex-1 min-w-0">
                    <span class="block font-semibold text-sm text-white">Email</span>
                    <span class="block text-[10px] text-ml/50 mt-0.5 truncate">pasharidhopradiptasetiawan@gmail.com</span>
                </div>
                <i class="fa-solid fa-arrow-up-right-from-square text-[10px] text-ml/25 group-hover:text-ml/50 transition-all duration-300 shrink-0"></i>
            </a>

        </nav>

        <!-- Footer -->
        <div class="mt-9 pt-5 border-t border-white/[0.04]">
            <p class="text-[10px] text-slate-700 tracking-[0.18em] uppercase font-medium">
                &copy; 2026 &middot; Pasha Ridho Pradipta Setiawan
            </p>
        </div>

    </main>

</body>
